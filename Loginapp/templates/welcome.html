<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Welcome</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
        background: #f4f7fc;
      }
      .container {
        text-align: center;
        background: #fff;
        padding: 40px 30px;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      }
      h1 {
        margin-bottom: 20px;
        color: #2c3e50;
      }
      p {
        margin-bottom: 30px;
        color: #555;
      }
      .actions a {
        display: inline-block;
        margin: 0 10px;
        padding: 12px 24px;
        border-radius: 8px;
        text-decoration: none;
        color: #fff;
        background: #007acc;
      }
      .actions a.secondary {
        background: #5a5a5a;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Welcome</h1>
      <p>Choose an option to continue to the application.</p>
      <div class="actions">
        <a href="register.html">Register</a>
        <a class="secondary" href="login.html">Login</a>
      </div>
    </div>
  </body>
</html>
